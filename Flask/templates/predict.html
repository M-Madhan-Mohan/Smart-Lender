<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loan Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold" href="/">💰 Smart Lender</a>

<a href="/" class="btn btn-light">Home</a>

</div>

</nav>

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center mb-4">Loan Eligibility Prediction</h2>

<form action="/submit" method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>Gender</label>

<select name="gender" class="form-control">

<option value="1">Male</option>

<option value="0">Female</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Married</label>

<select name="married" class="form-control">

<option value="1">Yes</option>

<option value="0">No</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Dependents</label>

<select name="dependents" class="form-control">

<option value="0">0</option>

<option value="1">1</option>

<option value="2">2</option>

<option value="3">3+</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Education</label>

<select name="education" class="form-control">

<option value="0">Graduate</option>

<option value="1">Not Graduate</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Self Employed</label>

<select name="self_employed" class="form-control">

<option value="1">Yes</option>

<option value="0">No</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Applicant Income</label>

<input type="number" name="applicant_income" class="form-control" required>

</div>

<div class="col-md-6 mb-3">

<label>Coapplicant Income</label>

<input type="number" name="coapplicant_income" class="form-control" required>

</div>

<div class="col-md-6 mb-3">

<label>Loan Amount</label>

<input type="number" name="loan_amount" class="form-control" required>

</div>

<div class="col-md-6 mb-3">

<label>Loan Amount Term</label>

<input type="number" name="loan_term" class="form-control" required>

</div>

<div class="col-md-6 mb-3">

<label>Credit History</label>

<select name="credit_history" class="form-control">

<option value="1">Good</option>

<option value="0">Bad</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Property Area</label>

<select name="property_area" class="form-control">

<option value="2">Urban</option>

<option value="1">Semiurban</option>

<option value="0">Rural</option>

</select>

</div>

</div>

<div class="text-center">

<button type="submit" class="btn btn-success btn-lg">

Predict Loan Status

</button>

</div>

</form>

</div>

</div>

</body>

</html>
